<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7RD BET - Bolão</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <span class="trophy">🎲</span>
      <div>
        <h1>7RD BET</h1>
        <div class="sub">Bolão da Fase de Grupos</div>
      </div>
    </div>
    <div class="nav">
      <a href="index.html" class="nav-link">← Voltar aos Grupos</a>
    </div>
    <div class="tools">
      <button id="btn-backup" class="btn btn-ghost">💾 Backup</button>
      <button id="btn-restore" class="btn btn-ghost">📂 Restaurar</button>
      <input type="file" id="file-backup" accept=".json" style="display:none">
    </div>
  </div>

  <div class="section">
    <div class="bet-add">
      <input type="text" id="bet-novo" placeholder="Nome do apostador">
      <button id="bet-add-btn" class="btn btn-blue">+ Adicionar</button>
    </div>
    <div id="bet-apostadores" class="bet-apostadores" style="margin-bottom: 20px;"></div>
    
    <div class="bet-grid">
      <div class="bet-lado">
        <h3 class="bet-sub">Ranking</h3>
        <div id="bet-ranking"></div>
      </div>
      <div class="bet-lado bet-lado-jogos">
        <h3 class="bet-sub">Jogos de Aposta</h3>
        <div id="bet-jogos"></div>
      </div>
    </div>
  </div>

  <!-- Scripts exclusivos do bolão -->
  <script src="data.js"></script>
  <script src="horarios.js"></script>
  <script src="storage.js"></script>
  <script src="bet.js"></script>
  <script src="betpage.js"></script>
</body>
</html>
