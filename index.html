<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa 2026 - Chaveamento</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <span class="trophy">🏆</span>
      <div>
        <h1>Copa do Mundo 2026</h1>
        <div class="sub">Simulador ao vivo</div>
      </div>
    </div>
    <div class="nav">
      <a href="bet.html" class="nav-link nav-bet">🎲 7RD BET</a>
    </div>
    <div class="tools">
      <button id="btn-odds" class="btn btn-gold" title="Preencher pela probabilidade">📊 Pelas odds</button>
      <button id="btn-simular" class="btn btn-gold">🎲 Simular resto</button>
      <button id="btn-restaurar" class="btn btn-ghost">Restaurar oficiais</button>
      <button id="btn-limpar" class="btn btn-ghost">Limpar tudo</button>
      <button id="btn-backup" class="btn btn-ghost">💾 Backup</button>
      <button id="btn-restore" class="btn btn-ghost">📂 Restaurar</button>
      <input type="file" id="file-backup" accept=".json" style="display:none">
    </div>
  </div>

  <div class="section">
    <h2 class="section-title">Fase de Grupos</h2>
    <div class="hint">
      <span class="leg leg-q"></span> Classificados
      <span class="leg leg-3"></span> Melhores 3º
      <span class="leg leg-out"></span> Eliminados
    </div>
    <div id="grupos-grid" class="grupos-grid"></div>
  </div>

  <div class="section">
    <h2 class="section-title">Mata-mata</h2>
    <div id="ko-aviso" class="hint"></div>
    <div class="bracket-wrap">
      <div id="bracket" class="bracket"></div>
    </div>
    <div id="bracket-extra" class="bracket-extra"></div>
  </div>

  <!-- Ordem exata dos scripts baseados no projeto original -->
  <script src="data.js"></script>
  <script src="horarios.js"></script>
  <script src="seed.js"></script>
  <script src="forcas.js"></script>
  <script src="odds.js"></script>
  <script src="storage.js"></script>
  <script src="thirds-table.js"></script>
  <script src="standings.js"></script>
  <script src="bracket.js"></script>
  <script src="app.js"></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
