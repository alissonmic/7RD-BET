<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>7RD BET - Bolão Copa 2026</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Barra Superior -->
  <div class="topbar">
    <div class="brand"><h1>7RD BET</h1></div>
    <!-- Botões de Backup que você tem no seu JS -->
    <div class="tools">
      <button id="btn-backup" class="btn btn-ghost">Salvar Backup</button>
      <button id="btn-restore" class="btn btn-ghost">Restaurar</button>
      <input type="file" id="file-backup" accept=".json" style="display:none">
    </div>
  </div>

  <div class="section">
    <!-- Adicionar Apostadores -->
    <div class="bet-add">
      <input type="text" id="bet-novo" placeholder="Nome do apostador (Ex: João)">
      <button id="bet-add-btn" class="btn btn-blue">Adicionar Apostador</button>
    </div>
    <div id="bet-apostadores" class="bet-apostadores" style="margin-bottom: 20px;"></div>
    
    <div class="bet-grid">
      <!-- Ranking -->
      <div class="bet-lado">
        <h3 class="bet-sub">Ranking do Bolão</h3>
        <div id="bet-ranking"></div>
      </div>
      <!-- Jogos do Dia -->
      <div class="bet-lado bet-lado-jogos">
        <h3 class="bet-sub">Jogos de Aposta</h3>
        <div id="bet-jogos"></div>
      </div>
    </div>
  </div>

  <!-- Todos os seus scripts na ordem certa -->
  <script src="data.js"></script>
  <script src="horarios.js"></script>
  <script src="seed.js"></script>
  <script src="storage.js"></script>
  <script src="bet.js"></script>
  <script src="betpage.js"></script>
  
  <!-- Script para transformar em App de Celular -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
